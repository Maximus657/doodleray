name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Install frontend dependencies
        run: npm ci

      # Download xray-core for Windows (with integrity check)
      - name: Download xray-core
        run: |
          $xrayVersion = "v25.3.6"
          $url = "https://github.com/XTLS/Xray-core/releases/download/$xrayVersion/Xray-windows-64.zip"
          Invoke-WebRequest -Uri $url -OutFile xray.zip
          $hash = (Get-FileHash -Path xray.zip -Algorithm SHA256).Hash
          Write-Host "xray-core SHA256: $hash"
          Expand-Archive -Path xray.zip -DestinationPath xray-core-tmp
          New-Item -ItemType Directory -Force -Path "src-tauri/xray-core"
          Copy-Item "xray-core-tmp/xray.exe" "src-tauri/xray-core/"
          Copy-Item "xray-core-tmp/geoip.dat" "src-tauri/xray-core/"
          Copy-Item "xray-core-tmp/geosite.dat" "src-tauri/xray-core/"
          # Download wintun.dll for TUN (with integrity check)
          $wintunUrl = "https://www.wintun.net/builds/wintun-0.14.1.zip"
          Invoke-WebRequest -Uri $wintunUrl -OutFile wintun.zip
          $wintunHash = (Get-FileHash -Path wintun.zip -Algorithm SHA256).Hash
          Write-Host "wintun SHA256: $wintunHash"
          if ($wintunHash -ne "07C256185D6EE3652E09FA55C0B673B2571B6A693C4B5E9B4540552547F1E0F5") {
            Write-Error "wintun checksum mismatch! Expected 07C256185D6EE3652E09FA55C0B673B2571B6A693C4B5E9B4540552547F1E0F5, got $wintunHash"
            exit 1
          }
          Expand-Archive -Path wintun.zip -DestinationPath wintun-tmp
          Copy-Item "wintun-tmp/wintun/bin/amd64/wintun.dll" "src-tauri/xray-core/"
        shell: pwsh

      # Download sing-box for Windows
      - name: Download sing-box
        run: |
          $sbVersion = "1.13.2"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$sbVersion/sing-box-$sbVersion-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile singbox.zip
          Expand-Archive -Path singbox.zip -DestinationPath singbox-tmp
          Copy-Item "singbox-tmp/sing-box-$sbVersion-windows-amd64/sing-box.exe" "src-tauri/"
        shell: pwsh
      # Build libsingbox.dll from Go source
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: src-tauri/singbox-core/go.sum

      - name: Build libsingbox.dll
        run: |
          cd src-tauri/singbox-core
          $env:CGO_ENABLED = "1"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -tags "with_quic,with_utls,with_dhcp,with_clash_api" -buildmode=c-shared -o ../libsingbox.dll .
          Write-Host "Built libsingbox.dll:"
          Get-Item ../libsingbox.dll
        shell: pwsh

      # Configure Tauri to bundle external binaries
      - name: Setup external resources
        run: |
          # Copy binaries to where Tauri build expects them
          $targetDir = "src-tauri/target/release"
          New-Item -ItemType Directory -Force -Path "$targetDir/xray-core"
          Copy-Item "src-tauri/xray-core/*" "$targetDir/xray-core/" -Recurse
          Copy-Item "src-tauri/sing-box.exe" "$targetDir/" -ErrorAction SilentlyContinue
        shell: pwsh

      # Strip trailing whitespace/newlines from signing key
      - name: Clean signing key
        shell: bash
        run: |
          KEY=$(echo -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '\n\r ')
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY" >> $GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DoodleRay ${{ github.ref_name }}"
          releaseBody: |
            ## 📦 Downloads

            Pick the right installer for your operating system:

            ### 🪟 Windows
            | File | Description |
            |------|-------------|
            | `DoodleRay_x.x.x_x64-setup.exe` | Windows installer (64-bit) — **recommended** |
            | `DoodleRay_x.x.x_x64-setup.nsis.zip` | Portable NSIS archive |

            ### 🍎 macOS
            | File | Description |
            |------|-------------|
            | `DoodleRay_x.x.x_aarch64.dmg` | macOS installer for Apple Silicon (M1/M2/M3/M4) — **recommended for modern Macs** |
            | `DoodleRay_x.x.x_x64.dmg` | macOS installer for Intel Macs |

            ### 🔄 Auto-update
            `latest.json` is used by the built-in updater — you don't need to download it manually.

            ---
            > **Tip:** If you're not sure which file to pick — on **Windows** grab the `.exe`, on **Mac** grab the `.dmg` matching your chip (Apple Silicon = `aarch64`, Intel = `x64`).
          releaseDraft: false
          prerelease: false

  build-macos:
    needs: build-windows
    runs-on: macos-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      
      - name: Install frontend dependencies
        run: npm ci

      # Download xray-core for macOS
      - name: Download xray-core
        run: |
          XRAY_VERSION="v25.3.6"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            XRAY_ARCH="macos-arm64-v8a"
          else
            XRAY_ARCH="macos-64"
          fi
          curl -L "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-${XRAY_ARCH}.zip" -o xray.zip
          unzip xray.zip -d xray-core-tmp
          mkdir -p src-tauri/xray-core
          cp xray-core-tmp/xray src-tauri/xray-core/
          cp xray-core-tmp/geoip.dat src-tauri/xray-core/
          cp xray-core-tmp/geosite.dat src-tauri/xray-core/
          chmod +x src-tauri/xray-core/xray

      # Download sing-box for macOS
      - name: Download sing-box
        run: |
          SB_VERSION="1.13.2"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            SB_ARCH="darwin-arm64"
          else
            SB_ARCH="darwin-amd64"
          fi
          curl -L "https://github.com/SagerNet/sing-box/releases/download/v${SB_VERSION}/sing-box-${SB_VERSION}-${SB_ARCH}.tar.gz" -o singbox.tar.gz
          tar xzf singbox.tar.gz
          cp sing-box-${SB_VERSION}-${SB_ARCH}/sing-box src-tauri/
          chmod +x src-tauri/sing-box

      # Build libsingbox.dylib from Go source
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: src-tauri/singbox-core/go.sum

      - name: Build libsingbox.dylib
        run: |
          cd src-tauri/singbox-core
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            export GOARCH=arm64
          else
            export GOARCH=amd64
          fi
          export CGO_ENABLED=1
          export GOOS=darwin
          go build -tags "with_quic,with_utls,with_dhcp,with_clash_api" -buildmode=c-shared -o ../libsingbox.dylib .
          echo "Built libsingbox.dylib:"
          ls -la ../libsingbox.dylib

      # Ad-hoc codesign the external binaries so macOS doesn't quarantine them
      - name: Codesign external binaries
        run: |
          # Remove quarantine attributes
          xattr -cr src-tauri/xray-core/xray 2>/dev/null || true
          xattr -cr src-tauri/sing-box 2>/dev/null || true
          xattr -cr src-tauri/libsingbox.dylib 2>/dev/null || true
          # Ad-hoc codesign (required for macOS to allow execution)
          codesign --force --sign - src-tauri/xray-core/xray
          codesign --force --sign - src-tauri/sing-box
          codesign --force --sign - src-tauri/libsingbox.dylib
          # Verify
          codesign -v src-tauri/xray-core/xray && echo "xray signed OK"
          codesign -v src-tauri/sing-box && echo "sing-box signed OK"
          codesign -v src-tauri/libsingbox.dylib && echo "libsingbox signed OK"
          # List what Tauri will bundle
          echo "=== xray-core/ contents ==="
          ls -la src-tauri/xray-core/
          echo "=== sing-box ==="
          ls -la src-tauri/sing-box
          echo "=== libsingbox ==="
          ls -la src-tauri/libsingbox.dylib

      # Strip trailing whitespace/newlines from signing key
      - name: Clean signing key
        shell: bash
        run: |
          KEY=$(echo -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" | tr -d '\n\r ')
          echo "TAURI_SIGNING_PRIVATE_KEY=$KEY" >> $GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "DoodleRay ${{ github.ref_name }}"
          releaseBody: |
            ## 📦 Downloads

            Pick the right installer for your operating system:

            ### 🪟 Windows
            | File | Description |
            |------|-------------|
            | `DoodleRay_x.x.x_x64-setup.exe` | Windows installer (64-bit) — **recommended** |
            | `DoodleRay_x.x.x_x64-setup.nsis.zip` | Portable NSIS archive |

            ### 🍎 macOS
            | File | Description |
            |------|-------------|
            | `DoodleRay_x.x.x_aarch64.dmg` | macOS installer for Apple Silicon (M1/M2/M3/M4) — **recommended for modern Macs** |
            | `DoodleRay_x.x.x_x64.dmg` | macOS installer for Intel Macs |

            ### 🔄 Auto-update
            `latest.json` is used by the built-in updater — you don't need to download it manually.

            ---
            > **Tip:** If you're not sure which file to pick — on **Windows** grab the `.exe`, on **Mac** grab the `.dmg` matching your chip (Apple Silicon = `aarch64`, Intel = `x64`).
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
